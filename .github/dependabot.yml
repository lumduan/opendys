version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    # Majors are intentional migrations — handle them by hand.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # eslint-plugin-react-refresh 0.5+ requires ESLint 9 (flat config); we run ESLint 8.
      # Stay on 0.4.x (patches still allowed) until an ESLint 9 migration.
      - dependency-name: "eslint-plugin-react-refresh"
        update-types: ["version-update:semver-minor"]
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react"
          - "@types/react-dom"
      build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
          - "typescript"
          - "eslint*"
          - "@typescript-eslint/*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 2
