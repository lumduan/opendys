name: Feature request
description: Suggest an idea to make opendys more helpful
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the reader need or accessibility gap this addresses.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: false
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: This can be done 100% client-side (no backend, no data egress)
