name: Bug report
description: Report a problem with opendys
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Upload / capture ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: language
    attributes:
      label: Language mode
      options:
        - English
        - Thai
        - Both / mixed
        - Not applicable
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 130 on Windows 11
    validations:
      required: false
