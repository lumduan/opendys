# Developer-friendly compose:
#   docker compose up                     -> dev server with HMR on :5173
#   docker compose --profile prod up --build -> hardened nginx prod build on :8080
services:
  dev:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      # Named volume keeps container node_modules isolated from the host bind mount.
      - dev_node_modules:/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

  prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile
    image: opendys:latest
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  dev_node_modules:
